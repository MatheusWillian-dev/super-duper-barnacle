<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Uma Pergunta Especial ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Corações flutuantes -->
    <div class="heart-container" id="heart-container"></div>

    <!-- Tela 1: Pergunta Principal -->
    <div class="screen active" id="screen-1">
        <div class="question-box">
            <h1>❤️ Quer sair comigo? ❤️</h1>
            <p style="color: #666; font-size: 1.1rem; margin: 20px 0;">Essa é a pergunta mais importante da minha vida...</p>
            <div class="buttons-container">
                <button id="btn-yes">Sim 💕</button>
                <button id="btn-no">Não</button>
            </div>
        </div>
    </div>

    <!-- Tela 2: Seleção de Data -->
    <div class="screen" id="screen-2">
        <div class="date-box">
            <h2>📅 Que dia você quer? 📅</h2>
            <p style="color: #666; margin-bottom: 25px;">Escolha um dia especial para nosso encontro:</p>
            <input type="date" id="date-input">
            <button id="btn-confirm-date">Confirmar Data ✨</button>
        </div>
    </div>

    <!-- Tela 3: Confirmação -->
    <div class="screen" id="screen-3">
        <div class="confirmation-box">
            <h2>🎉 Você disse SIM! 🎉</h2>
            <p>Que legal! Vou contar os dias para nosso encontro...</p>
            <div class="date-display" id="date-display">
                Carregando...
            </div>
            <p style="color: #999; font-size: 0.95rem; margin-top: 15px;">Clique no botão abaixo para confirmar no WhatsApp:</p>
            <button id="btn-whatsapp">Enviar Confirmação 💬</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
